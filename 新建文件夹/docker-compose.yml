# ================================================
# 农助手 Docker Compose - 全套架构（含监控）
# ================================================
# 使用方式: docker-compose up -d

version: '3.8'

services:
  # ========== 基础设施 ==========
  mysql:
    image: mysql:8.0
    container_name: nong-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-nongzhushou123}
      MYSQL_DATABASE: nongzhushou
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nong-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nong-rabbitmq
    ports:
      - "5672:5672"     # AMQP 协议端口
      - "15672:15672"   # 管理界面 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ========== 应用服务 ==========
  backend:
    build: ./backend
    container_name: nong-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: nongzhushou
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nongzhushou123}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      ZIPKIN_HOST: zipkin
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      GAODE_MAP_API_KEY: ${GAODE_MAP_API_KEY:-}
      TRACING_SAMPLE_RATE: 0.1  # 生产环境 10% 采样
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend-uniapp
    container_name: nong-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # ========== 可观测性三件套 ==========
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: nong-zipkin
    ports:
      - "9411:9411"   # Zipkin UI

  prometheus:
    image: prom/prometheus:latest
    container_name: nong-prometheus
    ports:
      - "9090:9090"   # Prometheus UI
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: nong-grafana
    ports:
      - "3000:3000"   # Grafana UI (admin/admin)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
